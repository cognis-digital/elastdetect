name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run test suite
        env:
          PYTHONUTF8: "1"
        run: python -m pytest -q

      - name: Validate example rules (CI gate demo)
        run: elastdetect validate examples/rules

      - name: Diff example rule sets
        run: elastdetect diff examples/diff/ruleset_old.json examples/diff/ruleset_new.json
